[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "atlas-embedder"
version = "0.1.0"
description = "ATLAS embedder service — text → dense vector via sentence-transformers."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
authors = [{ name = "ATLAS contributors" }]

dependencies = [
    "fastapi>=0.111",
    "uvicorn[standard]>=0.29",
    "sentence-transformers>=3.0",
    "torch>=2.0",
    "pydantic>=2",
]

[project.optional-dependencies]
dev = ["pytest>=8", "httpx>=0.27"]

[project.scripts]
atlas-embedder = "embedder.main:run"

[tool.hatch.build.targets.wheel]
packages = ["src/embedder"]
