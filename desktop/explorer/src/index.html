<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ATLAS Explorer</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div class="logo">⬡ ATLAS</div>
      <nav id="tab-nav">
        <button class="tab-btn active" data-tab="browser">Browser</button>
        <button class="tab-btn" data-tab="search">Search</button>
        <button class="tab-btn" data-tab="lineage">Lineage</button>
        <button class="tab-btn" data-tab="version">Version</button>
        <button class="tab-btn" data-tab="policy">Policy</button>
      </nav>
      <div id="store-info">
        <button id="open-store-btn">Open Store…</button>
        <div id="store-path"></div>
      </div>
    </aside>

    <main id="content">
      <div id="tab-browser" class="tab-panel active"></div>
      <div id="tab-search"  class="tab-panel hidden"></div>
      <div id="tab-lineage" class="tab-panel hidden"></div>
      <div id="tab-version" class="tab-panel hidden"></div>
      <div id="tab-policy"  class="tab-panel hidden"></div>
    </main>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
